services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: [ "9000:9000", "9001:9001" ]
    volumes: [ minio-data:/data ]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: chestnykvt
    ports: [ "5432:5432" ]
    volumes: [ pg-data:/var/lib/postgresql/data ]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://pguser:pgpass@postgres:5432/chestnykvt
      MLFLOW_ARTIFACT_ROOT: s3://mlflow/
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on: [ minio, postgres ]
    ports: [ "5000:5000" ]

  fastapi:
    build: .
    environment:
      MODEL_PATH: /model/model.pkl
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
    ports: [ "8000:8000" ]
    volumes: [ ./model:/model ]
    depends_on: [ minio ]

  airflow-scheduler:
    image: apache/airflow:2.9.0
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pguser:pgpass@postgres:5432/airflow
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - airflow-data:/opt/airflow
    command: >
      bash -c "airflow db migrate &&
               airflow scheduler"
    depends_on: [ postgres ]

  airflow-webserver:
    image: apache/airflow:2.9.0
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pguser:pgpass@postgres:5432/airflow
      AIRFLOW__WEBSERVER__WORKERS: 2
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - airflow-data:/opt/airflow
    command: bash -c "airflow webserver"
    ports: [ "8080:8080" ]
    depends_on: [ airflow-scheduler ]

volumes:
  pg-data:
  minio-data:
  airflow-data: